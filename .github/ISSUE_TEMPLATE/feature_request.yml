name: Feature Request
description: Suggest a new feature or improvement for Action Overlay
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Your ideas help make Action Overlay better.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - New Overlay / Sensor
        - Overlay Appearance / Styling
        - Export Options
        - Video Preview
        - Telemetry Parsing (new format / device)
        - Presets / Templates
        - UI / Workflow
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Or what workflow would it improve?
      placeholder: "I often find myself wanting to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: If applicable, add mockups, sketches, or examples from other apps. You can drag and drop images here.
    validations:
      required: false

  - type: dropdown
    id: drone
    attributes:
      label: Drone / Camera
      description: Is this feature specific to a particular device?
      options:
        - DJI Mini 4 Pro
        - DJI Air 3
        - DJI Mavic 3 (series)
        - DJI Avata (series)
        - DJI FPV
        - Other DJI
        - GoPro
        - Not device-specific
        - Other
      multiple: true
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context or information about this feature request.
    validations:
      required: false
